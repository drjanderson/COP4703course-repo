services:

  # PostgreSQL DB
  psql_db:
    image: postgres:15-alpine

    ports:
      - "5432:5432"

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U my_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Python API
  api:
    build: .

    depends_on:
      psql_db:
        condition: service_healthy

    volumes:
      - .:/app

    env_file:
      - .env

  # Adminer DB GUI
#  adminer:
#    image: adminer
#    ports:
#      - "8080:8080"

  # pgAdmin GUI
  pgadmin:
    image: dpage/pgadmin4
    container_name: my_pgadmin
    ports:
      - "5050:80"

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin

volumes:
  postgres_data: