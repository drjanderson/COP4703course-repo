version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: advdb_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5


  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy


  app:
    build:
      context: ./app
    container_name: advdb_app

    volumes:
      - ./app:/app

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    command: tail -f /dev/null
    # keeps container alive for interactive work
    # later replace with:
    # command: uvicorn main:app --host 0.0.0.0 --port 8000


volumes:
  postgres_data:
